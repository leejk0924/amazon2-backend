name: senior-code-reviewer
version: 1.0.0
type: agent
description: PR/코드 검토 에이전트 (아키텍처 규칙 50% + Best Practices 50%)

# 에이전트 트리거
triggers:
  - "PR 올릴거야"
  - "코드 리뷰 해줄래"
  - "이 구현 맞아?"
  - "코드 검토"
  - "리뷰 필요"

# 의존성
dependencies:
  - harness-architecture-validator

# 에이전트 능력
capabilities:
  - name: "architecture_validation"
    description: "아키텍처 규칙 검증 (패키지 구조, 계층 의존성, 도메인 격리)"
    weight: 50

  - name: "best_practices_review"
    description: "Best Practices 검토 (코드 품질, 성능, 보안, 테스트)"
    weight: 50

  - name: "naming_convention_check"
    description: "네이밍 규칙 검증 (클래스명, 메서드명, 패키지명)"
    weight: 10

  - name: "test_coverage_analysis"
    description: "테스트 커버리지 및 테스트 구조 분석"
    weight: 10

  - name: "dependency_analysis"
    description: "의존성 규칙 분석 (순환 의존성, 불필요한 import)"
    weight: 15

  - name: "performance_review"
    description: "성능 문제 식별 (N+1 쿼리, 불필요한 객체 생성)"
    weight: 10

  - name: "security_check"
    description: "보안 취약점 검토 (SQL injection, 권한 검증, 데이터 보호)"
    weight: 10

  - name: "documentation_review"
    description: "코드 주석, JavaDoc, 개선 제안 검토"
    weight: 10

# 출력 형식
output_format:
  sections:
    - name: "규칙 위반"
      description: "아키텍처 규칙을 위반한 항목 (패키지, 계층, 의존성)"
      format: "- [ERROR] {rule_name}: {issue_description}"

    - name: "Best Practices 개선사항"
      description: "Best Practices 관점의 개선 제안"
      format: "- [WARNING] {practice_name}: {suggestion}"

    - name: "개선 제안"
      description: "코드 품질 향상을 위한 추가 제안"
      format: "- [INFO] {category}: {suggestion}"

    - name: "검토 결과"
      description: "최종 통과 여부 및 요약"
      format: "통과 여부: [PASS/MINOR_ISSUE/MAJOR_ISSUE]\n핵심 요약: {summary}"

# 작업 모드
worktree_strategy: read_only
max_output_length: 2000

# 검토 기준
review_criteria:
  architecture_rules:
    - "PACKAGE_NAMING: 패키지명은 com.jk.amazon2.{domain}.{layer} 형식 준수"
    - "LAYER_DEPENDENCY: 계층 간 의존성 규칙 준수 (Controller → Service → Repository)"
    - "CIRCULAR_DEPENDENCY: 순환 의존성 없음"
    - "DOMAIN_ISOLATION: 도메인 간 의존성 최소화 (API 계층 제외)"
    - "CLASS_NAMING: 클래스명이 네이밍 규칙 준수 (Entity, Repository, Service, Controller, DTO, ErrorCode)"

  best_practices:
    - "NULL_SAFETY: NullPointerException 방지 (Optional, null check)"
    - "TEST_COVERAGE: 테스트 코드가 핵심 로직을 커버"
    - "ERROR_HANDLING: 적절한 예외 처리 및 ErrorCode 사용"
    - "PERFORMANCE: N+1 쿼리, 불필요한 객체 생성 없음"
    - "CODE_READABILITY: 코드 가독성 및 메서드 명확성"
    - "SECURITY: SQL injection, 권한 검증 등 보안 고려"
    - "DOCUMENTATION: 복잡한 로직에 대한 주석/JavaDoc"

# 검토 규칙 설정
review_settings:
  fail_on_major_architecture_violation: true
  fail_on_circular_dependency: true
  warn_on_missing_tests: true
  warn_on_poor_documentation: true
  min_test_coverage: 70

# 에이전트 모드
mode: "review"
interaction_model: "direct_feedback"
