networks:
  db-net:
    name: amazon-db
    driver: bridge
  amazon2:
    driver: bridge

services:
  mysql:
    container_name: "amazon-db"
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=application
      - MYSQL_PASSWORD=application
    volumes:
      - ./infra/mysql:/var/lib/mysql
    networks:
      - db-net
      - amazon2
    ports:
      - "3306:3306"

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    container_name: amazon2-github-mcp
    stdin_open: true
    tty: true
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
      GITHUB_TOOLSETS: "issues,pull_requests"
    networks:
      - amazon2

  github-mcp-wrapper:
    build: ./mcp-wrapper
    container_name: amazon2-git-mcp-wrapper
    stdin_open: true
    tty: true
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      REPOSITORY: ${REPOSITORY}
      LOG_LEVEL: info
      CONTRIBUTING_MD_PATH: /app/docs/CONTRIBUTING.md
    volumes:
      - ./docs/CONTRIBUTING.md:/app/docs/CONTRIBUTING.md:ro
    depends_on:
      - github-mcp
    networks:
      - amazon2